# KEDA ScaledObject for autoscaling workers based
# on the Temporal task queue backlog size.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker
  namespace: temporal-autoscaling-demo
spec:
  scaleTargetRef:
    name: worker
  # Check queue size every 10 seconds.
  pollingInterval: 10
  # Wait 30 seconds before scaling down.
  # Activities complete in under 3 seconds,
  # so a short cooldown is sufficient.
  cooldownPeriod: 30
  minReplicaCount: 1
  maxReplicaCount: 5
  triggers:
    - type: temporal
      metadata:
        endpoint: "temporal-frontend.temporal:7233"
        namespace: "default"
        taskQueue: "order-processing"
        # Scale up when backlog exceeds 5 tasks per replica.
        targetQueueSize: "5"
        # Activate from zero when at least 1 task is pending.
        activationTargetQueueSize: "1"
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          # Override the default 5-minute stabilization
          # window so scale-down is visible during a demo.
          stabilizationWindowSeconds: 30
          policies:
            # Remove only 1 pod every 15 seconds.
            # Activities complete in under 3 seconds,
            # so pods drain quickly.
            - type: Pods
              value: 1
              periodSeconds: 15
