services:
  temporal:
    image: temporalio/temporal
    ports:
      - "7233:7233"
      - "8233:8233"
    command: server start-dev --ip 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health"]
      interval: 10s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: ./worker
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 10s
      retries: 3
    depends_on:
      temporal:
        condition: service_healthy
    deploy:
      replicas: 3

  console:
    build:
      context: ./console
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8080:8080"
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 10s
      retries: 3
    depends_on:
      temporal:
        condition: service_healthy
