spring:
  application:
    name: autoscaling-demo-console

  temporal:
    connection:
      target: ${TEMPORAL_ADDRESS:localhost:7233}

logging:
  structured:
    format:
      console: ecs

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${PORT:8080}
