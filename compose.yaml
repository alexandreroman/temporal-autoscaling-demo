services:
  temporal:
    image: temporalio/temporal
    ports:
      - "7233:7233"   # gRPC frontend
      - "8233:8233"   # Dev Server web UI
    command: server start-dev --ip 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health"]
      interval: 10s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: ./worker
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://prometheus:9090/api/v1/otlp
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9081/actuator/health"]
      interval: 10s
      timeout: 10s
      retries: 3
    depends_on:
      temporal:
        condition: service_healthy
    deploy:
      replicas: 3

  console:
    build:
      context: ./console
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - GRAFANA_URL=http://grafana:3000
    ports:
      - "8080:8080"
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 10s
      retries: 3
    depends_on:
      temporal:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-otlp-receiver
    volumes:
      - ./observability/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_LOG_LEVEL=warn
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./k8s/grafana/dashboard.json:/var/lib/grafana/dashboards/dashboard.json:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
