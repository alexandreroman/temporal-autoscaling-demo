<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
  <!--/* Primary swap: replaces #plan-summary */-->
  <div th:replace="~{index :: plan-summary}"></div>
  <!--/* OOB swap: updates preset buttons */-->
  <div id="presets" hx-swap-oob="true" class="flex gap-2">
    <th:block th:replace="~{index :: preset-buttons}">
    </th:block>
  </div>
  <!--/* OOB swap: force preset to "custom" */-->
  <input type="hidden" name="preset" id="preset-input"
         value="custom" hx-swap-oob="true">
</body>
</html>
